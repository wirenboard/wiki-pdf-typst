name: Update Wiki PDFs

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:  # Manual trigger

jobs:
  update-pdfs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Typst
        run: |
          curl -sL https://github.com/typst/typst/releases/download/v0.13.1/typst-x86_64-unknown-linux-musl.tar.xz | tar xJ
          mv typst-x86_64-unknown-linux-musl/typst bin/typst
          chmod +x bin/typst
          mkdir -p output

      - name: Update PDFs
        env:
          WIKI_BOT_USER: ${{ secrets.WIKI_BOT_USER }}
          WIKI_BOT_PASS: ${{ secrets.WIKI_BOT_PASS }}
        run: python3 wiki_publish.py
